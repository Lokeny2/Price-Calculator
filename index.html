<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tanite Price Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <div class="calculator">

                <!-- The Header -->
                <div class="calc-header">
                    <h1>Tanite Mini-Mart</h1>
                    <p class="subtitle">Fresh prices, every day</p>
                </div>

                <!-- Category Filter Pills -->
                <div class="filter-row">
                    <button class="filter-btn active" data-category="All">All</button>
                    <button class="filter-btn" data-category="Fruit">Fruit</button>
                    <button class="filter-btn" data-category="Vegetable">Vegetable</button>
                    <button class="filter-btn" data-category="Dairy">Dairy</button>
                    <button class="filter-btn" data-category="Grain">Grain</button>
                    <button class="filter-btn" data-category="Grocery">Grocery</button>
                </div>

                <!-- User Inputs — wrapped in input-section so CSS can stack them -->
                <div class="input-section">
                    <label for="productSelect">Product</label>
                    <select id="productSelect">
                        <option value="" disabled selected>Choose a product...</option>
                    </select>

                    <label for="qtyInput">Quantity</label>
                    <input type="number" id="qtyInput" placeholder="e.g. 3" min="1">
                </div>

                <!-- Action Buttons -->
                <div class="action-row">
                    <button id="calcBtn">Calculate Total</button>
                    <button id="clearBtn">Clear</button>
                </div>

                <!-- Receipt Output -->
                <div id="receiptBox" class="receipt-box hidden">
                    <p id="receipt"></p>
                </div>
            </div>

           <div class="cart-container">
              <ul id="cartList">
              </ul>
              <p>Grand Total: KSh <span id="totalDisplay">0.00</span></p>
            </div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
